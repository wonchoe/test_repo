name: Test Self-Hosted Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  runner-check:
    name: Runner Connectivity Check
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    steps:
      - name: Show runner info
        run: |
          echo "Runner is online"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          uname -a

name: Test Self-Hosted Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  runner-check:
    name: Runner Connectivity Check
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    steps:
      - name: Show runner info
        run: |
          echo "Runner is online"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          uname -a

      - name: Use system hook outputs (injected via GITHUB_ENV automatically)
        run: |
          echo "--- Variables injected by runner hook (user did NOT define these) ---"
          echo "RUNNER_HOOK_EXECUTED=$RUNNER_HOOK_EXECUTED"
          echo "RUNNER_HOOK_TIME_UTC=$RUNNER_HOOK_TIME_UTC"
          echo "RUNNER_HOOK_NAME=$RUNNER_HOOK_NAME"
          echo "RUNNER_HOOK_HOST=$RUNNER_HOOK_HOST"
          echo "RUNNER_HOOK_SYSTEM_CHECK=$RUNNER_HOOK_SYSTEM_CHECK"
          echo "RUNNER_HOOK_SYSTEM_DETAILS=$RUNNER_HOOK_SYSTEM_DETAILS"
          echo "RUNNER_HOOK_DISK_FREE_MB=$RUNNER_HOOK_DISK_FREE_MB"
          echo "RUNNER_HOOK_DOCKER=$RUNNER_HOOK_DOCKER"

      - name: Use SYSTEM STEP outputs (from custom runner binary)
        run: |
          echo "--- Variables injected by CUSTOM SYSTEM STEP (separate visible step) ---"
          echo "SYSTEM_CHECK_PASSED=$SYSTEM_CHECK_PASSED"
          echo "SYSTEM_DISK_FREE=$SYSTEM_DISK_FREE"
          echo "SYSTEM_DISK_PERCENT=$SYSTEM_DISK_PERCENT"
          echo "SYSTEM_MEM_FREE=$SYSTEM_MEM_FREE"
          echo "SYSTEM_MEM_TOTAL=$SYSTEM_MEM_TOTAL"
          echo "SYSTEM_DOCKER_STATUS=$SYSTEM_DOCKER_STATUS"
          echo "SYSTEM_DOCKER_CONTAINERS=$SYSTEM_DOCKER_CONTAINERS"
          echo "SYSTEM_LOAD=$SYSTEM_LOAD"
          echo "SYSTEM_CHECK_TIMESTAMP=$SYSTEM_CHECK_TIMESTAMP"

      - name: Fail if system check not passed
        if: env.SYSTEM_CHECK_PASSED != 'true'
        run: |
          echo "::error::System step check failed!"
          exit 1

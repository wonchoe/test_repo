name: Test Self-Hosted Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  runner-check:
    name: Runner Connectivity Check
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    steps:
      - name: Show runner info
        run: |
          echo "Runner is online"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          uname -a

      - name: Show automatic prehook env
        run: |
          echo "PREHOOK_EXECUTED=${PREHOOK_EXECUTED:-}"
          echo "PREHOOK_TIME_UTC=${PREHOOK_TIME_UTC:-}"
          echo "PREHOOK_RUNNER_NAME=${PREHOOK_RUNNER_NAME:-}"
          echo "PREHOOK_HOST=${PREHOOK_HOST:-}"

name: Test Self-Hosted Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  runner-check:
    name: Runner Connectivity Check
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    steps:
      - name: Show runner info
        run: |
          echo "Runner is online"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          uname -a

      - name: Use system hook outputs (injected via GITHUB_ENV automatically)
        run: |
          echo "--- Variables injected by runner hook (user did NOT define these) ---"
          echo "RUNNER_HOOK_EXECUTED=$RUNNER_HOOK_EXECUTED"
          echo "RUNNER_HOOK_TIME_UTC=$RUNNER_HOOK_TIME_UTC"
          echo "RUNNER_HOOK_NAME=$RUNNER_HOOK_NAME"
          echo "RUNNER_HOOK_HOST=$RUNNER_HOOK_HOST"
          echo "RUNNER_HOOK_SYSTEM_CHECK=$RUNNER_HOOK_SYSTEM_CHECK"
          echo "RUNNER_HOOK_SYSTEM_DETAILS=$RUNNER_HOOK_SYSTEM_DETAILS"
          echo "RUNNER_HOOK_DISK_FREE_MB=$RUNNER_HOOK_DISK_FREE_MB"
          echo "RUNNER_HOOK_DOCKER=$RUNNER_HOOK_DOCKER"

      - name: Fail if system check not passed
        if: env.RUNNER_HOOK_SYSTEM_CHECK != 'passed'
        run: |
          echo "::error::System pre-flight check failed: $RUNNER_HOOK_SYSTEM_DETAILS"
          exit 1
